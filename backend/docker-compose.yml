name: charity_project

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: charity_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Tắt mật khẩu để Dev local cho dễ thở
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Giới hạn RAM (512MB) để không lag máy
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: charity_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch